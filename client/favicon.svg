<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Tile shadow -->
  <rect x="6" y="6" width="52" height="52" rx="4" fill="#c4a265"/>
  <!-- Tile body -->
  <rect x="4" y="4" width="52" height="52" rx="4" fill="#f5e6c8" stroke="#c4a265" stroke-width="2"/>
  <!-- Letter S -->
  <text x="30" y="42" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="bold" fill="#3b2c1a" text-anchor="middle">S</text>
  <!-- Point value -->
  <text x="48" y="52" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#6b5430" text-anchor="middle">1</text>
</svg>
